name: Add paper from issue

# Fill in the "📄 Add a paper" issue form -> this resolves + grounds venue + commits.
# `labeled` (not `opened`): the form applies the add-paper label on submit, so labeled
# fires once. Listening on opened too would double-fire and race two runs on the push.
on:
  issues:
    types: [labeled, edited]

permissions:
  contents: write   # push the new paper + regenerated README
  issues: write     # comment back / close the issue

jobs:
  add:
    # only the add-paper form (not the weekly digest, which uses `paper-candidate`)
    if: contains(join(github.event.issue.labels.*.name, ','), 'add-paper')
    runs-on: ubuntu-latest
    concurrency: edit-papers        # shared lane with remove-paper: no racing on papers.yaml
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml

      - name: Resolve + add paper
        id: add
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          # Secrets (add under Settings → Secrets → Actions):
          #   DEEPSEEK_API_KEY  — enables auto-classify + web venue extraction
          #   TAVILY_API_KEY (or SERPER_API_KEY) — enables the web venue channel
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: python scripts/add_from_issue.py

      - name: Commit + push
        id: push
        if: steps.add.outputs.status == 'added'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ README.md          # data/ so a Benchmark entry (benchmarks.yaml) is committed too
          git commit -m "Add paper from #${{ github.event.issue.number }}" \
            -m "Closes #${{ github.event.issue.number }}"
          # retry the push a few times so a lost concurrency race doesn't drop the paper
          for i in 1 2 3 4 5; do
            git push && exit 0
            git pull --rebase origin main
          done
          git push

      - name: Comment result
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(cat <<'__EOF__'
          ${{ steps.add.outputs.summary }}
          __EOF__
          )
          [ -z "$BODY" ] && BODY="Something went wrong before the paper could be processed — check the workflow logs."
          gh issue comment ${{ github.event.issue.number }} --body "$BODY" --repo "$GITHUB_REPOSITORY"

      - name: Rename issue to the resolved title
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: ${{ steps.add.outputs.title }}          # via env, not inline — titles contain quotes
          STATUS: ${{ steps.add.outputs.status }}
          PUSH: ${{ steps.push.outcome }}
        run: |
          # only rename once the entry actually landed, so the title never lies
          if [ -n "$TITLE" ] && { [ "$PUSH" = "success" ] || [ "$STATUS" = "duplicate" ]; }; then
            gh issue edit ${{ github.event.issue.number }} \
              --title "[Paper] $TITLE" --repo "$GITHUB_REPOSITORY" || true
          fi

      - name: Close issue (only if the change actually landed)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS='${{ steps.add.outputs.status }}'
          PUSH='${{ steps.push.outcome }}'   # success | failure | skipped
          # `added` must have a successful push; `duplicate` has nothing to push.
          # Never close on a failed push — that was silently dropping papers.
          if [ "$STATUS" = "duplicate" ] || { [ "$STATUS" = "added" ] && [ "$PUSH" = "success" ]; }; then
            gh issue close ${{ github.event.issue.number }} --repo "$GITHUB_REPOSITORY" || true
          fi
