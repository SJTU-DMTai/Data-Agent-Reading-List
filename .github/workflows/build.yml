name: Build README

on:
  push:
    branches: [main]
    paths: ['data/**', 'scripts/**', 'README.md']
  pull_request:
    paths: ['data/**', 'scripts/**', 'README.md']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml

      # PRs must ship a regenerated README; pushes to main self-heal.
      - name: Check README is up to date (PR)
        if: github.event_name == 'pull_request'
        run: python scripts/generate_readme.py --check

      - name: Regenerate README (push)
        if: github.event_name == 'push'
        run: |
          python scripts/generate_readme.py
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: regenerate README from data/"
            git push
          fi

  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress --accept 200..=299,403,429
            --exclude 'dl.acm.org' --exclude 'openreview.net'
            README.md
          fail: false
