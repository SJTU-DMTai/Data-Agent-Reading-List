name: Backfill venues

# Re-ground the venue of existing papers still shown as a bare `arXiv'YY.MM`.
# Many entries were added before venue grounding, or have since been accepted to a
# conference. This re-checks each such entry (arXiv comment -> Semantic Scholar -> DBLP
# -> web+LLM) and rewrites just the `venue:` line where a real venue is found.
#
# Actions tab -> "Backfill venues" -> Run workflow.
on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Write the changes (uncheck for a dry-run that only reports)'
        required: false
        type: boolean
        default: true
      reconsider_all:
        description: 'Re-check every paper, not just the arXiv-only ones (slow)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # push the rewritten venues + regenerated README

jobs:
  backfill:
    runs-on: ubuntu-latest
    concurrency: edit-papers          # shared write-lane with add-paper / remove-paper / add-selected
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml

      - name: Backfill venues
        id: bf
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: |
          ARGS=""
          [ "${{ github.event.inputs.apply }}" = "true" ] && ARGS="$ARGS --apply"
          [ "${{ github.event.inputs.reconsider_all }}" = "true" ] && ARGS="$ARGS --all"
          python scripts/backfill_venues.py $ARGS | tee backfill.out
          {
            echo '## Venue backfill'
            echo '```'
            cat backfill.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Regenerate README + commit
        if: github.event.inputs.apply == 'true'
        run: |
          python scripts/generate_readme.py
          if git diff --quiet -- data/ README.md; then
            echo "No venue changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ README.md
          git commit -m "Backfill venues for existing papers"
          git push
