name: "📄 Add a paper"
description: Add a paper to the reading list — the bot resolves, classifies, and commits it
title: "[Paper] <title>"
labels: [add-paper]
body:
  - type: markdown
    attributes:
      value: |
        Fill this in and submit — a GitHub Action will resolve the paper, ground its
        venue, add it to `data/papers.yaml`, regenerate the README, and push. It comments
        back here with the result. Just paste an **arXiv link _or_ the paper title**.
  - type: input
    id: paper
    attributes:
      label: arXiv link or paper title
      description: An arXiv id/URL, or just the exact title (the bot will look it up).
      placeholder: "https://arxiv.org/abs/2602.16720  —or—  APEX-SQL: Talking to the data via Agentic Exploration"
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Pick one, or let the bot classify it for you.
      options:
        - Auto (let the bot classify)
        - Data Preparation & Integration
        - NL2SQL (Text-to-SQL)
        - Table Understanding & Reasoning
        - Table Generation, Curation & Synthesis
        - Data Analysis & Insight Discovery
        - Data Science & Machine Learning Agents
        - Database Operations & Diagnosis
        - Agent Memory & Context Engineering
        - General Agent Techniques
        - Benchmark
        - Survey
      default: 0
    validations:
      required: true
  - type: input
    id: venue
    attributes:
      label: Venue (optional)
      description: Leave blank to auto-ground it. Fill in to override (e.g. a brand-new acceptance).
      placeholder: "e.g. VLDB'25, ICDE'26, KDD'26"
  - type: dropdown
    id: bench_group
    attributes:
      label: Benchmark group (benchmarks only)
      description: Only used when Category = Benchmark — which of the three benchmark tables it goes in.
      options:
        - Auto (Data Agent Benchmarks)
        - Data Agent Benchmarks
        - Latest Benchmarks for Tabular Data (Since 2024)
        - Selected Classical Reasoning Benchmarks for Tabular Data
      default: 0
  - type: input
    id: author
    attributes:
      label: Corresponding author (benchmarks & surveys, optional)
      description: For a Benchmark this fills the author/task-type column; for a Survey the corresponding author. Leave blank to auto-fill.
      placeholder: "e.g. Guoliang Li"
  - type: textarea
    id: why
    attributes:
      label: Why does it belong here? (optional)
      description: One or two sentences — helps a human sanity-check the bot.
