# Benchmarks, rendered as two tables in the README.
# Group fields: name, description (optional), label_column (header of the 2nd column),
#               show_tldr (bool), items.
# Item fields: name, label (corresp. author or task type), year, paper, code (optional), tldr (optional)
# TLDR house style: ONE concise sentence (~20-30 words) — what it evaluates, over what data.

- name: Data Agent Benchmarks
  label_column: Corresp. Author
  show_tldr: true
  items:
    - name: DSGym
      label: James Zou
      year: 2026
      paper: https://arxiv.org/pdf/2601.16344
      code: https://github.com/fannie1208/DSGym
      tldr: Standardized end-to-end evaluation of data-science agents in self-contained execution environments, spanning bioinformatics and prediction tasks.
    - name: DAB
      label: Shreya Shankar
      year: 2026
      paper: https://arxiv.org/pdf/2603.20576
      code: https://github.com/ucbepic/DataAgentBench
      tldr: Enterprise data agents answering end-to-end natural-language questions over heterogeneous databases, with data integration and unstructured extraction.
    - name: DSAEval
      label: Jian Huang
      year: 2026
      paper: https://arxiv.org/pdf/2601.13591
      code: https://anonymous.4open.science/r/DSAEval-B39C/
      tldr: 641 open-ended real-world data-science problems over structured and unstructured data, testing iterative multi-query project workflows.
    - name: DAComp
      label: Kang Liu
      year: 2025
      paper: https://arxiv.org/pdf/2512.04324
      code: https://github.com/ByteDance-Seed/DAComp
      tldr: Data agents across the full enterprise lifecycle — repository-level SQL pipeline construction and open-ended business analysis.
    - name: WebDS
      label: Christopher D. Manning
      year: 2025
      paper: https://arxiv.org/pdf/2508.01222
      tldr: End-to-end web-based analytics — autonomous browsing, data acquisition, cleaning, analysis, and visualization across 29 websites.
    - name: PredictiQ
      label: Xiaojun Ma
      year: 2025
      paper: https://arxiv.org/pdf/2505.17149
      code: https://github.com/Cqkkkkkk/PredictiQ
      tldr: Predictive-analysis ability across domains, pairing predictive queries with real datasets and checking text–code alignment.
    - name: InsightBench
      label: Issam Hadj Laradji
      year: 2025
      paper: https://arxiv.org/pdf/2407.06423
      code: https://github.com/ServiceNow/insight-bench
      tldr: End-to-end business analytics and insight discovery — posing questions, interpreting answers, and summarizing findings (ICLR'25).
    - name: FDABench
      label: Gao Cong
      year: 2025
      paper: https://arxiv.org/pdf/2509.02473
      code: https://github.com/fdabench/FDAbench
      tldr: Agents in multi-source scenarios, fusing structured (DB) and unstructured (PDF/audio) data into analytical answers and reports.
    - name: DSBench
      label: Dong Yu
      year: 2025
      paper: https://arxiv.org/pdf/2409.07703
      code: https://github.com/LiqiangJing/DSBench
      tldr: Realistic data-science tasks — cleaning, transformation, visualization, modeling — over long-horizon problems with live data stacks (ICLR'25).
    - name: DABStep
      label: Thomas Wolf
      year: 2025
      paper: https://arxiv.org/pdf/2506.23719
      code: https://huggingface.co/spaces/adyen/DABstep
      tldr: Iterative multi-step reasoning in financial analytics, cross-referencing structured tables with unstructured documentation.
    - name: DataSciBench
      label: Yisong Yue
      year: 2025
      paper: https://arxiv.org/pdf/2502.13897
      code: https://github.com/THUDM/DataSciBench/
      tldr: Data-science tasks with uncertain ground truth, evaluated via a Task–Function–Code framework across the analysis lifecycle.
    - name: InfiAgent-DABench
      label: Jingjing Xu
      year: 2024
      paper: https://arxiv.org/pdf/2401.05507
      code: https://github.com/InfiAgent/InfiAgent
      tldr: Closed-form data-analysis tasks over CSVs in Python, with answers matched to canonical labels (ICML'24).
    - name: DA-Code
      label: Kang Liu
      year: 2024
      paper: https://arxiv.org/pdf/2410.07331
      code: https://da-code-bench.github.io/
      tldr: Agentic code generation for challenging data-wrangling and analytics problems grounded in real input data.
    - name: DSEval
      label: Kan Ren
      year: 2024
      paper: https://arxiv.org/pdf/2402.17168
      code: https://github.com/MetaCopilot/dseval
      tldr: Full data-science lifecycle evaluated via bootstrapped annotation over sequences of interdependent problems (Kaggle/LeetCode).

- name: Benchmarks for Tabular Data
  label_column: Task Type
  show_tldr: true
  items:
    - name: MDBench
      label: Reasoning
      year: 2025
      paper: https://github.com/jpeper/MDBench
      tldr: Multi-document table reasoning, synthetically generated via knowledge-guided prompting.
    - name: MMQA
      label: Reasoning
      year: 2025
      paper: https://openreview.net/pdf?id=GGlpykXDCa
      code: https://github.com/WuJian1995/MMQA/issues/2
      tldr: Multi-table multi-hop QA over 3,312 tables in 138 domains — retrieval, Text-to-SQL, Table QA, and key selection.
    - name: ToRR
      label: Reasoning
      year: 2025
      paper: https://arxiv.org/pdf/2502.19412
      code: https://github.com/IBM/unitxt/blob/main/prepare/benchmarks/torr.py
      tldr: Table reasoning and robustness across 10 datasets, probing brittleness to serialization and perturbation.
    - name: MMTU
      label: Comprehensive
      year: 2025
      paper: https://arxiv.org/pdf/2506.05587
      code: https://github.com/MMTU-Benchmark/MMTU
      tldr: Massive multi-task table understanding — 30K+ questions over 25 real-world table tasks.
    - name: RADAR
      label: Reasoning
      year: 2025
      paper: https://kenqgu.com/assets/pdf/RADAR_ARXIV.pdf
      code: https://huggingface.co/datasets/kenqgu/RADAR
      tldr: Data-aware reasoning over imperfect tables with five artifact types the model must handle to answer correctly.
    - name: Spider2
      label: Text2SQL
      year: 2025
      paper: https://arxiv.org/abs/2411.07763
      code: https://github.com/xlang-ai/Spider2
      tldr: Real-world enterprise Text-to-SQL over BigQuery/Snowflake, with long contexts and 100+-line queries.
    - name: DataBench
      label: Reasoning
      year: 2024
      paper: https://aclanthology.org/2024.lrec-main.1179.pdf
      code: https://huggingface.co/datasets/cardiffnlp/databench
      tldr: QA over 65 real tabular datasets requiring numerical, boolean, or categorical reasoning.
    - name: TableBench
      label: Reasoning
      year: 2024
      paper: https://arxiv.org/abs/2408.09174
      code: https://github.com/TableBench/TableBench
      tldr: Table QA across 18 fields and 4 complexity levels — fact-checking, numerical reasoning, analysis, and visualization.
    - name: TQA-Bench
      label: Reasoning
      year: 2024
      paper: https://arxiv.org/pdf/2411.19504
      code: https://github.com/Relaxed-System-Lab/TQA-Bench
      tldr: Multi-table QA with scalable long context (up to 64k tokens) over relational databases.
    - name: SpreadsheetBench
      label: Reasoning
      year: 2024
      paper: https://arxiv.org/pdf/2406.14991
      code: https://github.com/RUCKBReasoning/SpreadsheetBench/tree/main/data
      tldr: Real-world spreadsheet manipulation from Excel forums — find, extract, modify, calculate, and more.
    - name: FinQA
      label: Reasoning
      year: 2021
      paper: https://arxiv.org/pdf/2109.00122
      code: https://github.com/czyssrs/FinQA
      tldr: Multi-step numerical reasoning over financial-report tables and text.
    - name: FeTaQA
      label: Reasoning
      year: 2021
      paper: https://arxiv.org/pdf/2104.00369
      code: https://github.com/Yale-LILY/FeTaQA
      tldr: Free-form table QA requiring generative, explanatory answers rather than short spans.
    - name: HiTab
      label: Reasoning
      year: 2022
      paper: https://aclanthology.org/2022.acl-long.78.pdf
      code: https://github.com/microsoft/HiTab
      tldr: Question answering and natural-language generation over hierarchical (matrix) tables.
