# Benchmarks, rendered as three tables in the README.
# Group fields: name, description (optional), label_column (header of the 2nd column),
#               show_tldr (bool), items.
# Item fields: name, label (corresp. author or task type), year, paper, code (optional), tldr (optional)

- name: Data Agent Benchmarks
  label_column: Corresp. Author
  show_tldr: true
  items:
    - name: DSGym
      label: James Zou
      year: 2026
      paper: https://arxiv.org/pdf/2601.16344
      code: https://github.com/fannie1208/DSGym
      tldr: >-
        Benchmark and training framework for standardized end-to-end evaluation of data science
        agents in self-contained execution environments. Sub-tasks: Planning, implementing, and
        validating data analyses across standardized benchmark tasks, plus expert-derived
        bioinformatics and prediction tasks. Input: Task instructions grounded in real datasets and
        executable environments. Output: Executable analyses and validated results. Metrics:
        Standardized execution-based performance across integrated task suites; also supports agent
        training through execution-verified data synthesis.
    - name: DAB
      label: Shreya Shankar
      year: 2026
      paper: https://arxiv.org/pdf/2603.20576
      code: https://github.com/ucbepic/DataAgentBench
      tldr: >-
        Benchmark for enterprise data agents on end-to-end natural-language data question answering
        over heterogeneous database systems. Sub-tasks: Multi-database querying, data integration
        across inconsistent references, unstructured text extraction/transformation, and downstream
        analytical reasoning. Input: Natural language enterprise-style queries over 12 datasets
        spanning 9 domains and 4 DBMSs. Output: Final answers generated through tool use, including
        database querying and Python-based analysis. Metrics: Pass@1 accuracy, with additional
        failure-mode and cost-efficiency analysis.
    - name: DSAEval
      label: Jian Huang
      year: 2026
      paper: https://arxiv.org/pdf/2601.13591
      code: https://anonymous.4open.science/r/DSAEval-B39C/
      tldr: >-
        Benchmark for evaluating data science agents on open-ended real-world problems across
        structured and unstructured data. Sub-tasks: Multimodal environment perception, iterative
        multi-query project workflows, and end-to-end reasoning, coding, and result generation.
        Input: 641 real-world data science problems grounded in 285 datasets spanning tables, text,
        and vision data. Output: Data science solutions consisting of code and final results for
        diverse tasks. Metrics: Multi-dimensional evaluation over reasoning, code, and result
        quality.
    - name: DAComp
      label: Kang Liu
      year: 2025
      paper: https://arxiv.org/pdf/2512.04324
      code: https://github.com/ByteDance-Seed/DAComp
      tldr: >-
        Benchmark for data agents across the full enterprise data intelligence lifecycle.
        Sub-tasks: Data engineering tasks such as repository-level multi-stage SQL pipeline
        construction and evolution under changing requirements, and data analysis tasks such as
        strategic planning, iterative exploratory coding, interpretation, and recommendation
        synthesis. Input: Industrial schemas for engineering tasks and open-ended business problems
        for analysis tasks. Output: Multi-stage SQL pipelines, analysis code, and decision-oriented
        insights or recommendations. Metrics: Execution-based multi-metric scoring for data
        engineering tasks and LLM-judge evaluation guided by hierarchical rubrics for data analysis
        tasks.
    - name: WebDS
      label: Christopher D. Manning
      year: 2025
      paper: https://arxiv.org/pdf/2508.01222
      tldr: >-
        End-to-end web-based benchmark reflecting real-world analytics workflows. Sub-tasks:
        Autonomous web browsing, data acquisition, cleaning, analysis, and visualization. Input:
        High-level analytical goals with access to 29 diverse websites. Output: Summarized analyses
        and insights.
    - name: PredictiQ
      label: Xiaojun Ma
      year: 2025
      paper: https://arxiv.org/pdf/2505.17149
      code: https://github.com/Cqkkkkkk/PredictiQ
      tldr: >-
        Benchmark specialized in predictive analysis capabilities across diverse fields. Sub-tasks:
        Text analysis and code generation for prediction tasks. Input: Sophisticated predictive
        queries paired with real-world datasets. Output: Prediction results with verified text-code
        alignment.
    - name: InsightBench
      label: Issam Hadj Laradji
      year: 2025
      paper: https://arxiv.org/pdf/2407.06423
      code: https://github.com/ServiceNow/insight-bench
      tldr: >-
        Benchmark from ICLR'25 paper. Benchmark for end-to-end business analytics and insight
        discovery. Sub-tasks: Formulating questions, interpreting answers, and summarizing
        findings. Input: Business datasets with high-level analytic goals. Output: Summary of
        discovered insights and actionable steps.
    - name: FDABench
      label: Gao Cong
      year: 2025
      paper: https://arxiv.org/pdf/2509.02473
      code: https://github.com/fdabench/FDAbench
      tldr: >-
        Benchmark for agents in multi-source analytical scenarios. Sub-tasks: Single-source
        structured analysis, unstructured data retrieval, and cross-source heterogeneous data
        fusion. Input: Analytical queries spanning structured (DB) and unstructured (PDF/Audio)
        sources. Output: SQL queries, precise values, or comprehensive analytical reports. Metrics:
        Exact-match for MC/checkbox tasks; text tasks by overlap metrics (e.g., ROUGE) plus
        tool-use success/recall; also reports efficiency (latency, model/tool calls, token/cost).
    - name: DSBench
      label: Dong Yu
      year: 2025
      paper: https://arxiv.org/pdf/2409.07703
      code: https://github.com/LiqiangJing/DSBench
      tldr: >-
        Benchmark from ICLR'25 paper. Realistic benchmark evaluating data science agents on complex
        tasks. Sub-tasks: Data cleaning, transformation, visualization, and modeling using
        libraries like Pandas/Scikit-learn. Input: Long-horizon problem descriptions with access to
        live data stacks. Output: Executable code and final artifacts (charts, tables, or answers).
        Metrics: Per-task 0-5 rubric with penalties for extra user interaction, corrections, or
        hallucinations; summarize overall score and hallucination rate.
    - name: DABStep
      label: Thomas Wolf
      year: 2025
      paper: https://arxiv.org/pdf/2506.23719
      code: https://huggingface.co/spaces/adyen/DABstep
      tldr: >-
        Benchmark focusing on iterative multi-step reasoning in financial analytics. Sub-tasks:
        Code-based data manipulation and cross-referencing structured tables with unstructured
        documentation. Input: Complex queries requiring multi-step navigation of heterogeneous
        data. Output: Factoid-style answers (string/numeric) verifiable by automatic scoring.
    - name: DataSciBench
      label: Yisong Yue
      year: 2025
      paper: https://arxiv.org/pdf/2502.13897
      code: https://github.com/THUDM/DataSciBench/
      tldr: >-
        Comprehensive benchmark evaluating uncertain ground truth using the Task-Function-Code
        framework. Sub-tasks: Data cleaning, exploration, visualization, predictive modeling, and
        report generation. Input: Natural language prompts accompanied by datasets. Output:
        Executable code and valid final answers derived from the data.
    - name: InfiAgent-DABench
      label: Jingjing Xu
      year: 2024
      paper: https://arxiv.org/pdf/2401.05507
      code: https://github.com/InfiAgent/InfiAgent
      tldr: >-
        Benchmark from ICML'24 paper. Benchmark for evaluating agents on closed-form data analysis
        tasks. Sub-tasks: Data querying, processing, and reasoning over CSV files using Python.
        Input: Natural language questions paired with CSV files. Output: Closed-form answers (e.g.,
        specific values or strings) matched against canonical labels.
    - name: DA-Code
      label: Kang Liu
      year: 2024
      paper: https://arxiv.org/pdf/2410.07331
      code: https://da-code-bench.github.io/
      tldr: >-
        Challenging benchmark for agentic code generation in data science. Sub-tasks: Complex data
        wrangling, analytics via code generation. Input: Natural language descriptions of
        domain-specific problems within input data.
    - name: DSEval
      label: Kan Ren
      year: 2024
      paper: https://arxiv.org/pdf/2402.17168
      code: https://github.com/MetaCopilot/dseval
      tldr: >-
        Evaluation paradigm covering the full data science lifecycle via bootstrapped annotation.
        Sub-tasks: Problem definition, data processing, and modeling across datasets like Kaggle or
        LeetCode. Input: Sequences of interdependent data science problems. Output: Code solutions
        and execution results for each iteration.

- name: Latest Benchmarks for Tabular Data (Since 2024)
  label_column: Task Type
  show_tldr: true
  items:
    - name: MDBench
      label: Reasoning
      year: 2025
      paper: https://github.com/jpeper/MDBench
      tldr: >-
        MDBench introduces a new multi-document reasoning benchmark synthetically generated through
        knowledge-guided prompting.
    - name: MMQA
      label: Reasoning
      year: 2025
      paper: https://openreview.net/pdf?id=GGlpykXDCa
      code: https://github.com/WuJian1995/MMQA/issues/2
      tldr: >-
        MMQA is a multi-table multi-hop question answering dataset with 3,312 tables across 138
        domains, evaluating LLMs' capabilities in multi-table retrieval, Text-to-SQL, Table QA, and
        primary/foreign key selection.
    - name: ToRR
      label: Reasoning
      year: 2025
      paper: https://arxiv.org/pdf/2502.19412
      code: https://github.com/IBM/unitxt/blob/main/prepare/benchmarks/torr.py
      tldr: >-
        ToRR is a benchmark assessing LLMs' table reasoning and robustness across 10 datasets with
        diverse table serializations and perturbations, revealing models' brittleness to format
        variations.
    - name: MMTU
      label: Comprehensive
      year: 2025
      paper: https://arxiv.org/pdf/2506.05587
      code: https://github.com/MMTU-Benchmark/MMTU
      tldr: >-
        MMTU is a massive multi-task table understanding and reasoning benchmark with over 30K
        questions across 25 real-world table tasks, designed to evaluate models' ability to
        understand, reason, and manipulate tables.
    - name: RADAR
      label: Reasoning
      year: 2025
      paper: https://kenqgu.com/assets/pdf/RADAR_ARXIV.pdf
      code: https://huggingface.co/datasets/kenqgu/RADAR
      tldr: >-
        RADAR is a benchmark for evaluating language models' data-aware reasoning on imperfect
        tabular data with 5 common data artifact types like outlier value or inconsistent format,
        which ensures that direct calculation on the perturbed table will yield an incorrect
        answer, forcing the model to handle the artifacts to obtain the correct result.
    - name: Spider2
      label: Text2SQL
      year: 2025
      paper: https://arxiv.org/abs/2411.07763
      code: https://github.com/xlang-ai/Spider2
      tldr: >-
        Evaluation framework for real-world enterprise text-to-SQL workflows. Sub-tasks:
        Interacting with complex SQL environments (BigQuery, Snowflake), handling diverse
        operations, and processing long contexts. Input: Natural language questions with
        enterprise-level database schemas. Output: Complex SQL queries (often >100 lines) to solve
        the workflow.
    - name: DataBench
      label: Reasoning
      year: 2024
      paper: https://aclanthology.org/2024.lrec-main.1179.pdf
      code: https://huggingface.co/datasets/cardiffnlp/databench
      tldr: >-
        Benchmark for Question Answering over Tabular Data assessing semantic reasoning. Sub-tasks:
        Answering questions requiring numerical, boolean, or categorical reasoning over diverse
        datasets. Input: Natural language questions paired with 65 real-world tabular datasets
        (CSV/Parquet). Output: Exact answer values (Boolean, Number, Category, or List) derived
        from the table.
    - name: TableBench
      label: Reasoning
      year: 2024
      paper: https://arxiv.org/abs/2408.09174
      code: https://github.com/TableBench/TableBench
      tldr: >-
        Comprehensive benchmark for Table QA covering 18 fields and 4 complexity categories.
        Sub-tasks: Fact-checking, numerical reasoning, data analysis, and visualization. Input:
        Natural language questions paired with tables emphasizing numerical data. Output: Final
        answers derived through complex reasoning steps (e.g., Chain-of-Thought).
    - name: TQA-Bench
      label: Reasoning
      year: 2024
      paper: https://arxiv.org/pdf/2411.19504
      code: https://github.com/Relaxed-System-Lab/TQA-Bench
      tldr: >-
        Benchmark for evaluating LLMs on multi-table question answering with scalable context.
        Sub-tasks: Reasoning across multiple interconnected tables and handling long-context
        serialization (up to 64k tokens). Input: Natural language questions paired with multi-table
        relational databases. Output: Answers or SQL queries derived from joining and analyzing
        multiple tables.
    - name: SpreadsheetBench
      label: Reasoning
      year: 2024
      paper: https://arxiv.org/pdf/2406.14991
      code: https://github.com/RUCKBReasoning/SpreadsheetBench/tree/main/data
      tldr: >-
        Benchmark for spreadsheet manipulation derived exclusively from real-world scenarios.
        Sub-tasks: Find, extract, sum, highlight, remove, modify, count, delete, calculate, and
        display. Input: Real-world user instructions from Excel forums paired with complex
        spreadsheet files. Output: Modified spreadsheet files or specific values matching the
        instruction.

